<style>
/* ============================================================
   GLOBAL
   ============================================================ */
:root {
  --mono:    'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --body:    'Inter', system-ui, -apple-system, sans-serif;
  --display: 'Space Grotesk', var(--body);

  --accent:   #ff6f61;
  --accent-hi:#ff4f3d;
  --gold:     #d9a441;
  --gold-hi:  #e9c66a;
  --ok:       #5bc48f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; background: #0a0a0a; }
html[data-theme="console"] { background: #0d0d0d; }
body { -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
b { font-weight: 600; }
::selection { background: rgba(255,111,97,0.30); color: #fff; }
img { max-width: 100%; }

#app { transition: opacity .3s ease; }

/* scroll progress bar (story only) */
#progress {
  position: fixed; top: 0; left: 0; height: 2px; width: 0;
  background: linear-gradient(90deg, var(--gold), var(--accent));
  z-index: 80; transition: width .1s linear; pointer-events: none;
  display: none;
}
html[data-theme="story"] #progress { display: block; }

/* ---------- theme switcher (global, persists across themes) ---------- */
.theme-switch { position: fixed; right: 20px; bottom: 20px; z-index: 90; font-family: var(--mono); }
.ts-trigger {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--mono); font-size: 0.78rem; color: #ece3d6;
  background: rgba(20,20,20,0.82); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.14); border-radius: 999px;
  padding: 9px 15px; cursor: pointer;
  box-shadow: 0 12px 34px -14px rgba(0,0,0,0.8);
  transition: border-color .2s, transform .2s, background .2s;
}
.ts-trigger:hover { border-color: var(--accent); transform: translateY(-1px); }
.ts-trigger .ts-ico { color: var(--accent); }
.ts-trigger .ts-caret { color: #8a8278; font-size: 0.65rem; transition: transform .2s; }
.theme-switch.open .ts-trigger .ts-caret { transform: rotate(180deg); }
.ts-menu {
  position: absolute; right: 0; bottom: calc(100% + 10px);
  width: 250px; padding: 7px;
  background: rgba(18,18,18,0.94); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
  box-shadow: 0 24px 60px -22px rgba(0,0,0,0.9);
  display: grid; gap: 4px;
  opacity: 0; transform: translateY(8px) scale(.98); transform-origin: bottom right;
  transition: opacity .18s ease, transform .18s ease; pointer-events: none;
}
.theme-switch.open .ts-menu { opacity: 1; transform: none; pointer-events: auto; }
.ts-opt {
  display: block; text-align: left; width: 100%;
  background: transparent; border: 1px solid transparent; border-radius: 10px;
  padding: 11px 13px; cursor: pointer; color: #ece3d6; font-family: var(--mono);
  transition: background .18s, border-color .18s;
}
.ts-opt:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
.ts-opt b { display: block; font-size: 0.86rem; font-weight: 600; }
.ts-opt span { display: block; font-size: 0.7rem; color: #8a8278; margin-top: 3px; }
.ts-opt[aria-current="true"] { border-color: var(--accent); background: rgba(255,111,97,0.07); }
.ts-opt[aria-current="true"] b::after { content: " ✓"; color: var(--accent); }
@media (max-width: 560px) {
  .theme-switch { right: 12px; bottom: 12px; }
  .ts-menu { width: 220px; }
}

/* ============================================================
   THEME · DEVELOPER CONSOLE
   ============================================================ */
[data-theme="console"] body {
  background: #0d0d0d; color: #ece3d6;
  font-family: var(--mono); font-size: 15px; line-height: 1.65;
  padding: 26px 18px 70px;
}
[data-theme="console"] {
  --bg:#0d0d0d; --term:#151413; --bar:#201e1c; --line:#2c2a27; --line-soft:#232120;
  --surface:#1c1a18; --surface-2:#232120;
  --text:#ece3d6; --muted:#9d9486; --faint:#6f6658;
  --prompt:#5bc48f; --path:#ff7a6b; --str:#8fcf9f; --cyan:#74b8d1; --comment:#6c7a64; --err:#ff6b6b;
}
[data-theme="console"] body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(900px 480px at 10% -8%, rgba(255,111,97,0.10), transparent 60%),
    radial-gradient(820px 560px at 100% 0%, rgba(218,165,32,0.10), transparent 58%);
}
[data-theme="console"] body::after {
  content: ""; position: fixed; inset: 0; z-index: 50; pointer-events: none;
  background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.014) 0 1px, transparent 1px 3px);
  mix-blend-mode: overlay;
}
[data-theme="console"] b { color: var(--text); }

[data-theme="console"] .term {
  position: relative; z-index: 1; max-width: 1080px; margin: 0 auto;
  background: var(--term); border: 1px solid var(--line); border-radius: 12px;
  box-shadow: 0 40px 90px -40px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.02) inset;
  overflow: hidden;
}
[data-theme="console"] .titlebar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 14px; height: 46px; padding: 0 16px;
  background: rgba(32,30,28,0.88); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
}
[data-theme="console"] .lights { display: flex; gap: 8px; }
[data-theme="console"] .lights i { width: 12px; height: 12px; border-radius: 50%; display: block; border: 1px solid rgba(0,0,0,0.25); }
[data-theme="console"] .lights .r { background: #ff5f57; }
[data-theme="console"] .lights .y { background: #febc2e; }
[data-theme="console"] .lights .g { background: #28c840; }
[data-theme="console"] .tb-title { flex: 1; text-align: center; font-size: 0.78rem; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
[data-theme="console"] .tb-title b { color: var(--muted); font-weight: 500; }
[data-theme="console"] .tb-status { display: inline-flex; align-items: center; gap: 7px; font-size: 0.7rem; color: var(--muted); }
[data-theme="console"] .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 0 rgba(91,196,143,0.5); animation: pulse 2.6s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(91,196,143,0.45); } 70% { box-shadow: 0 0 0 7px rgba(91,196,143,0); } 100% { box-shadow: 0 0 0 0 rgba(91,196,143,0); } }

[data-theme="console"] .termbody { padding: 26px clamp(16px, 4vw, 40px) 30px; }
[data-theme="console"] .boot { color: var(--comment); font-size: 0.84rem; margin-bottom: 8px; }
[data-theme="console"] .boot .ok { color: var(--ok); }
[data-theme="console"] .boot .arrow { color: var(--accent); }
[data-theme="console"] .boot div { white-space: pre-wrap; }

[data-theme="console"] .block { padding: 22px 0; border-top: 1px dashed var(--line-soft); }
[data-theme="console"] .block:first-of-type { border-top: none; padding-top: 8px; }
[data-theme="console"] .line { white-space: pre-wrap; word-break: break-word; color: var(--text); }
[data-theme="console"] .ps1 { color: var(--faint); user-select: none; }
[data-theme="console"] .ps1 .u { color: var(--prompt); }
[data-theme="console"] .ps1 .pp { color: var(--path); }
[data-theme="console"] .ps1 .pd { color: var(--text); }
[data-theme="console"] .typed { color: var(--text); }
[data-theme="console"] .line.active::after { content: "▮"; color: var(--accent); animation: blink 1.05s steps(1) infinite; margin-left: 1px; }
@keyframes blink { 50% { opacity: 0; } }

[data-theme="console"] .out { margin-top: 12px; }
html.js [data-theme="console"] .payload, html.js[data-theme="console"] .payload { opacity: 0; transform: translateY(8px); transition: opacity .5s ease, transform .5s ease; }
html.js .payload.show { opacity: 1; transform: none; }

[data-theme="console"] .cm { color: var(--comment); }
[data-theme="console"] .ky { color: var(--gold-hi); }
[data-theme="console"] .st { color: var(--str); }
[data-theme="console"] .fn { color: var(--cyan); }
[data-theme="console"] .lnk { color: var(--accent); border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
[data-theme="console"] .lnk:hover { color: var(--accent-hi); border-color: var(--accent-hi); }
[data-theme="console"] .ext { color: var(--faint); }

[data-theme="console"] .who .name { font-family: var(--display); font-weight: 700; font-size: clamp(2.4rem, 8vw, 4.4rem); line-height: 1.02; letter-spacing: -0.02em; color: var(--text); margin: 4px 0 14px; }
[data-theme="console"] .roles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
[data-theme="console"] .role { font-size: 0.82rem; color: var(--accent); border: 1px solid var(--line); background: rgba(255,111,97,0.06); padding: 5px 12px; border-radius: 7px; }
[data-theme="console"] .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
[data-theme="console"] .badge { display: inline-flex; align-items: center; gap: 8px; font-size: 0.76rem; color: var(--muted); border: 1px solid var(--line); background: var(--surface); padding: 6px 12px; border-radius: 999px; }

[data-theme="console"] .skill-grp { margin-top: 16px; }
[data-theme="console"] .skill-grp > .cm { display: block; margin-bottom: 6px; }

[data-theme="console"] .xp-h { font-size: 1.05rem; margin-bottom: 4px; }
[data-theme="console"] .xp-h .when { color: var(--faint); float: right; font-size: 0.8rem; }
[data-theme="console"] .role-line { color: var(--muted); margin-bottom: 12px; }
[data-theme="console"] .grp { margin-top: 18px; }
[data-theme="console"] .grp > .cm { display: block; margin-bottom: 8px; }

[data-theme="console"] .loader { color: var(--muted); display: flex; align-items: center; gap: 10px; }
[data-theme="console"] .spin { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--line); border-top-color: var(--accent); animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

[data-theme="console"] .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
[data-theme="console"] .pcard { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 18px; overflow: hidden; transition: border-color .25s ease, transform .25s ease; }
[data-theme="console"] .pcard:hover { border-color: var(--accent); transform: translateY(-3px); }

[data-theme="console"] .pcard p { color: var(--muted); font-size: 0.88rem; margin-bottom: 12px; }
[data-theme="console"] .pcard .chips { margin-top: auto; }

[data-theme="console"] .statgrid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--surface); margin-bottom: 14px; }
[data-theme="console"] .statgrid .stat { padding: 16px 18px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
[data-theme="console"] .statgrid .stat .num { font-family: var(--display); font-weight: 700; font-size: 1.4rem; color: var(--gold-hi); display: block; }
[data-theme="console"] .statgrid .stat .lbl { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); margin-top: 3px; }

[data-theme="console"] .blogrow { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; padding: 11px 14px; border: 1px solid var(--line-soft); border-radius: 9px; background: var(--surface); margin-bottom: 10px; transition: border-color .2s ease, transform .2s ease; }
[data-theme="console"] .blogrow:hover { border-color: var(--accent); transform: translateX(3px); }
[data-theme="console"] .blogrow .bk { color: var(--cyan); font-size: 0.82rem; flex-shrink: 0; }
[data-theme="console"] .blogrow .bt { color: var(--muted); font-size: 0.9rem; }
[data-theme="console"] .blogrow .ext { margin-left: auto; }

[data-theme="console"] .contact { display: grid; gap: 8px; }
[data-theme="console"] .crow { display: flex; gap: 14px; padding: 9px 14px; border: 1px solid var(--line-soft); border-radius: 9px; background: var(--surface); color: var(--muted); transition: border-color .2s ease, color .2s ease; }
[data-theme="console"] .crow:hover { border-color: var(--accent); color: var(--text); }
[data-theme="console"] .crow .ky { flex-shrink: 0; white-space: pre; }

/* ============================================================
   THEME · APPLE STORYTELLING
   ============================================================ */
[data-theme="story"] body {
  background: #0a0a0a; color: #f2ece2;
  font-family: var(--body); font-size: 17px; line-height: 1.65;
}
[data-theme="story"] {
  --bg:#0a0a0a; --text:#f4eee5; --muted:#a59c8e; --faint:#6f675b; --line:rgba(255,255,255,0.10);
}
[data-theme="story"] body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(1100px 700px at 12% -10%, rgba(255,111,97,0.10), transparent 60%),
    radial-gradient(1000px 720px at 100% 4%, rgba(218,165,32,0.09), transparent 58%),
    radial-gradient(900px 700px at 50% 116%, rgba(218,165,32,0.06), transparent 60%);
}
[data-theme="story"] .story { position: relative; z-index: 1; }
[data-theme="story"] .wrap { max-width: 1080px; margin: 0 auto; padding: 0 28px; }
[data-theme="story"] b { color: var(--text); }

/* reveal primitive */
[data-theme="story"] .reveal { opacity: 0; transform: translateY(34px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
[data-theme="story"] .reveal.in { opacity: 1; transform: none; }
[data-theme="story"] .stagger > * { opacity: 0; transform: translateY(22px); transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
[data-theme="story"] .stagger.in > * { opacity: 1; transform: none; }

/* hero */
[data-theme="story"] .st-hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 100px 28px 80px; max-width: 1080px; margin: 0 auto; }
[data-theme="story"] .st-kicker { font-family: var(--mono); font-size: 0.84rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 26px; }
[data-theme="story"] .st-hero-title { font-family: var(--display); font-weight: 700; font-size: clamp(2.7rem, 8vw, 6rem); line-height: 1.04; letter-spacing: -0.03em; color: var(--text); }
[data-theme="story"] .st-hero-title em { font-style: normal; color: var(--accent); }
[data-theme="story"] .st-hero-sub { margin-top: 28px; font-family: var(--mono); font-size: 0.96rem; color: var(--muted); }
[data-theme="story"] .st-scrollcue { margin-top: 64px; font-family: var(--mono); font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); display: flex; align-items: center; gap: 12px; }
[data-theme="story"] .st-scrollcue span { width: 1px; height: 38px; background: linear-gradient(var(--accent), transparent); display: inline-block; animation: cue 2.4s ease-in-out infinite; }
@keyframes cue { 0%,100% { transform: scaleY(.5); opacity: .5; transform-origin: top; } 50% { transform: scaleY(1); opacity: 1; transform-origin: top; } }

/* big narrative statements */
[data-theme="story"] .st-statement { min-height: 86vh; display: flex; flex-direction: column; justify-content: center; max-width: 1080px; margin: 0 auto; padding: 60px 28px; }
[data-theme="story"] .st-statement h2 { font-family: var(--display); font-weight: 600; font-size: clamp(2.4rem, 7.5vw, 5.4rem); line-height: 1.05; letter-spacing: -0.03em; color: var(--faint); transition: color .9s ease; }
[data-theme="story"] .st-statement.in h2 { color: var(--text); }
