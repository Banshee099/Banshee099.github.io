  <text x="100" y="152" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#ADADB5" letter-spacing="3">CUDA · DAY ONE</text>

  <circle cx="170" cy="34" r="5" fill="#3FB68B"/>
